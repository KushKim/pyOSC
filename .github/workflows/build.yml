name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --windowed --name "OSC_Master_Tool" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: OSC_Master_Tool_Windows
          path: dist/OSC_Master_Tool.exe
