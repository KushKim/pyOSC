# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시될 때만 실행
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 버튼을 눌러 실행할 수도 있게 함

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest] # 윈도우와 맥에서 동시 실행

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir release_assets
        copy dist\OSC_Master_Tool.exe release_assets\OSC_Master_Tool_Windows.exe

    - name: Prepare Artifacts (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir release_assets
        cd dist
        zip -r ../release_assets/OSC_Master_Tool_macOS.zip OSC_Master_Tool.app

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: release_assets/*

  release:
    name: Create GitHub Release
    needs: build # 빌드가 성공적으로 끝나면 실행
    if: startsWith(github.ref, 'refs/tags/') # 태그 푸시일 때만 릴리즈 생성
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true