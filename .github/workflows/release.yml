# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시될 때만 실행
  workflow_dispatch: # 수동 실행

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Get Version
      id: version
      shell: bash
      run: |
        # 태그 푸시인 경우 'v1.2.0' 같은 태그명을 추출, 아니면 'dev'로 설정
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        else
          echo "VERSION=dev" >> $GITHUB_ENV
        fi

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p release_assets
        # 파일명에 ${{ env.VERSION }} 변수를 삽입합니다
        cp dist/OSC_Master_Tool.exe release_assets/OSC_Master_Tool_${{ env.VERSION }}_Windows.exe

    - name: Prepare Artifacts (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mkdir -p release_assets
        cd dist
        # 파일명에 ${{ env.VERSION }} 변수를 삽입합니다
        zip -r ../release_assets/OSC_Master_Tool_${{ env.VERSION }}_macOS.zip OSC_Master_Tool.app

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: release_assets/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true